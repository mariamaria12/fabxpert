packages:
  - "apps/*"
  - "packages/*"

# Build-script approvals managed by `pnpm approve-builds` (pnpm 11+).
allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
  sharp: true
  # Build script not needed — @tabler/icons-webfont ships prebuilt fonts in dist/.
  ttf2woff2: false
  unrs-resolver: true
