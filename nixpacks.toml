# Railway/Nixpacks config for apps/api (monorepo root).
# Pin Node 20 (.nvmrc / engines). Do NOT use corepack for pnpm 11 — it fails on Railway
# with ERR_VM_DYNAMIC_IMPORT_CALLBACK_MISSING even on Node 20.
# Install pnpm globally via npm instead.

[variables]
NIXPACKS_NODE_VERSION = "20"

[phases.install]
cmds = [
  "corepack disable || true",
  "npm install -g pnpm@11.5.2",
  "pnpm install --frozen-lockfile",
]

[phases.build]
cmds = [
  "pnpm --filter @fabxpert/db db:generate",
  "pnpm turbo build --filter=@fabxpert/api...",
]

[start]
cmd = "pnpm --filter @fabxpert/api start:prod"
