# Railway/Nixpacks config for apps/api (monorepo root).
# Pin Node 22 (.nvmrc / engines). pnpm 11.5.2 requires Node >= 22.13 (node:sqlite).
# Nixpacks fallback: install pnpm via npm instead of corepack if corepack fails.

[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.install]
cmds = [
  "corepack disable || true",
  "npm install -g pnpm@11.5.2",
  "pnpm install --frozen-lockfile",
]

[phases.build]
cmds = [
  "pnpm --filter @fabxpert/db db:generate",
  "pnpm turbo build --filter=@fabxpert/api...",
]

[start]
cmd = "pnpm --filter @fabxpert/api start:prod"
